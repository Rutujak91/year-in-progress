<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>New Tab</title>
<style>
/* ── Reset & base ─────────────────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:hsl(220,20%,95%);
  --card:hsl(0,0%,100%);
  --fg:hsl(220,20%,10%);
  --muted:hsl(220,15%,92%);
  --muted-fg:hsl(220,10%,45%);
  --border:hsl(220,15%,88%);
  --primary:hsl(230,65%,55%);
  --accent:hsl(145,45%,48%);
  --destructive:hsl(0,70%,55%);
  --streak:hsl(25,95%,55%);
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --radius:.75rem;
}
html,body{
  font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);
  color:var(--fg);
  min-height:100vh;
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

/* ── Layout ───────────────────────────────────────────────────────────── */
.page{max-width:64rem;margin:0 auto;padding:2.5rem 1.5rem 4rem;}
.space-y-10>*+*{margin-top:2.5rem;}
.space-y-5>*+*{margin-top:1.25rem;}
.space-y-3>*+*{margin-top:.75rem;}
.space-y-2>*+*{margin-top:.5rem;}
.space-y-1-5>*+*{margin-top:.375rem;}
.space-y-1>*+*{margin-top:.25rem;}
.space-y-05>*+*{margin-top:.125rem;}

/* ── Mode toggle ──────────────────────────────────────────────────────── */
.mode-wrap{display:flex;justify-content:center;}
.mode-pill{display:inline-flex;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:.25rem;gap:.25rem;}
.mode-btn{
  display:flex;align-items:center;gap:.5rem;
  padding:.5rem 1rem;border-radius:calc(var(--radius) - 2px);
  font-size:.875rem;font-weight:500;border:none;
  color:var(--muted-fg);background:none;transition:all .15s;
}
.mode-btn:hover{color:var(--fg);background:hsla(220,15%,92%,.5);}
.mode-btn.active{background:var(--primary);color:#fff;box-shadow:var(--shadow);}
.mode-btn svg{width:14px;height:14px;flex-shrink:0;}

/* Tooltip for set-default */
.tip-wrap{position:relative;display:inline-flex;}
.tip-box{
  position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:var(--fg);color:var(--bg);
  font-size:11px;font-weight:500;padding:5px 10px;border-radius:6px;
  white-space:nowrap;z-index:50;pointer-events:none;opacity:0;
  transition:opacity .15s;display:flex;align-items:center;gap:5px;
}
.tip-wrap:hover .tip-box{opacity:1;pointer-events:auto;}

/* ── Header ───────────────────────────────────────────────────────────── */
.header{text-align:center;}
.greeting{font-size:clamp(1.5rem,3vw,1.875rem);font-weight:700;letter-spacing:-.025em;margin-bottom:1.25rem;}

/* Year progress */
.year-bar{max-width:20rem;margin:0 auto;}
.year-meta{display:flex;justify-content:space-between;font-size:11px;font-weight:500;margin-bottom:.375rem;}
.year-label{color:hsla(220,10%,45%,.6);}
.year-pct{color:var(--primary);font-variant-numeric:tabular-nums;}
.year-track{height:6px;background:hsla(220,15%,92%,.5);border-radius:999px;overflow:hidden;}
.year-fill{height:100%;background:var(--primary);border-radius:999px;}
.year-days{font-size:10px;color:hsla(220,10%,45%,.5);text-align:center;margin-top:.375rem;font-variant-numeric:tabular-nums;}

/* Quote */
.quote-view{text-align:center;cursor:pointer;max-width:32rem;margin:0 auto;padding:.75rem 1.5rem;border-radius:var(--radius);transition:background .15s;}
.quote-view:hover{background:hsla(220,15%,50%,.06);}
.quote-view:hover .q-pencil{opacity:1;}
.quote-text{font-size:1.125rem;font-style:italic;font-weight:500;color:hsla(220,20%,10%,.8);line-height:1.625;letter-spacing:-.01em;}
.quote-author{font-size:.75rem;color:var(--muted-fg);margin-top:.5rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;}
.q-pencil{display:flex;justify-content:center;margin-top:.75rem;opacity:0;transition:opacity .2s;color:hsla(220,10%,45%,.3);}
.quote-edit{max-width:32rem;margin:0 auto;display:flex;flex-direction:column;gap:.5rem;}
.quote-edit textarea,.quote-edit input{
  width:100%;background:hsla(220,15%,92%,.4);border:1px solid var(--border);
  border-radius:var(--radius);padding:.75rem 1rem;color:var(--fg);
  outline:none;font-size:1rem;
}
.quote-edit textarea{resize:none;height:72px;line-height:1.5;font-style:italic;}
.quote-edit textarea:focus,.quote-edit input:focus{box-shadow:0 0 0 2px hsla(230,65%,55%,.3);border-color:var(--primary);}
.q-save{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;font-weight:500;color:var(--primary);background:none;border:none;margin:0 auto;}
.q-save:hover{opacity:.8;}

/* ── Two-col layout ───────────────────────────────────────────────────── */
.two-col{display:grid;grid-template-columns:3fr 2fr;gap:2rem;}
@media(max-width:900px){.two-col{grid-template-columns:1fr;}}

/* ── Goals ────────────────────────────────────────────────────────────── */
.section-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.section-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted-fg);}
.link-btn{display:flex;align-items:center;gap:.25rem;font-size:11px;font-weight:500;color:var(--primary);background:none;border:none;transition:opacity .15s;}
.link-btn:hover{opacity:.75;}
.link-btn svg{width:12px;height:12px;}
.hidden-btn{display:flex;align-items:center;gap:.25rem;font-size:10px;font-weight:500;background:none;border:none;color:hsla(220,10%,45%,.5);transition:all .15s;}
.hidden-btn:hover{color:var(--muted-fg);}
.hidden-btn.active{color:var(--primary);}
.hidden-btn svg{width:12px;height:12px;}

.add-row{display:flex;gap:.5rem;align-items:center;margin-bottom:.5rem;}
.add-inp{
  flex:1;background:hsla(220,15%,92%,.6);border:1px solid var(--border);
  border-radius:.5rem;padding:.375rem .75rem;font-size:.875rem;color:var(--fg);outline:none;
}
.add-inp:focus{box-shadow:0 0 0 2px hsla(230,65%,55%,.3);border-color:var(--primary);}
.add-inp::placeholder{color:hsla(220,10%,45%,.5);}
.xs-btn{font-size:.75rem;font-weight:500;background:none;border:none;color:var(--primary);}
.xs-btn:hover{opacity:.8;}
.xs-btn.muted{color:var(--muted-fg);}
.xs-btn.muted:hover{color:var(--fg);}

/* Goal card */
.goal-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;transition:opacity .2s;}
.goal-card+.goal-card{margin-top:.5rem;}
.goal-card.is-hidden{opacity:.5;}
.goal-card-hdr{display:flex;align-items:center;justify-content:space-between;padding:.625rem 1rem;cursor:pointer;transition:background .13s;}
.goal-card-hdr:hover{background:hsla(220,15%,92%,.3);}
.goal-hdr-left{display:flex;align-items:center;gap:.625rem;}
.goal-hdr-left svg{width:14px;height:14px;color:var(--muted-fg);}
.goal-emoji{font-size:1rem;}
.goal-name{font-size:.9375rem;font-weight:600;letter-spacing:-.01em;}
.status-pill{font-size:9px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:999px;}
.status-pill.on{background:hsla(145,45%,48%,.15);color:var(--accent);}
.status-pill.off{background:hsla(0,70%,55%,.1);color:var(--destructive);}
.status-pill.hidden-lbl{color:hsla(220,10%,45%,.5);}
.goal-hdr-right{display:flex;align-items:center;gap:2px;}
.icon-btn{background:none;border:none;padding:4px;color:hsla(220,10%,45%,.3);display:flex;align-items:center;transition:all .15s;}
.icon-btn:hover{color:var(--muted-fg);}
.icon-btn.del:hover{color:var(--destructive);}
.icon-btn svg{width:14px;height:14px;}

/* Activity grid */
.goal-body{padding:.25rem 1rem .75rem;}
.day-hdr-row{display:flex;align-items:center;margin-bottom:4px;}
.day-hdr-spacer{flex:1;}
.day-hdrs{display:flex;}
.day-hdr-cell{width:28px;text-align:center;font-size:9px;font-weight:500;color:hsla(220,10%,45%,.6);}
.day-hdr-cell.today{color:var(--primary);font-weight:700;}
.day-hdr-actions{width:56px;}

.act-row{display:flex;align-items:center;margin-bottom:2px;}
.act-row:hover .act-icon-btn{opacity:1;}
.act-info{flex:1;min-width:0;display:flex;align-items:center;gap:.5rem;padding-right:.75rem;}
.act-name{font-size:.8125rem;font-weight:600;color:hsla(220,20%,10%,.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.act-name.blurred{filter:blur(4px);color:hsla(220,10%,45%,.4);user-select:none;}
.act-streak{font-size:10px;color:var(--streak);display:flex;align-items:center;gap:2px;font-weight:500;flex-shrink:0;}
.act-streak svg{width:10px;height:10px;}
.act-count{font-size:9px;color:hsla(220,10%,45%,.5);flex-shrink:0;font-variant-numeric:tabular-nums;}
.act-days{display:flex;}
.day-cell-wrap{width:28px;display:flex;justify-content:center;}
.day-cell{
  width:20px;height:20px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .13s;
  background:hsla(220,15%,92%,.5);border:none;
}
.day-cell:hover{background:var(--muted);}
.day-cell.done{background:var(--accent);box-shadow:var(--shadow);}
.day-cell.done svg{color:#fff;}
.day-cell.is-today{}
.day-cell svg{width:12px;height:12px;}
.act-actions{width:56px;display:flex;justify-content:flex-end;gap:2px;}
.act-icon-btn{background:none;border:none;padding:2px;color:hsla(220,10%,45%,.3);opacity:0;display:flex;align-items:center;transition:all .15s;}
.act-icon-btn:hover{color:var(--muted-fg);opacity:1;}
.act-icon-btn.del:hover{color:var(--destructive);}
.act-icon-btn svg{width:14px;height:14px;}

.add-act-btn{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:500;color:hsla(230,65%,55%,.7);background:none;border:none;margin-top:6px;transition:color .15s;}
.add-act-btn:hover{color:var(--primary);}
.add-act-btn svg{width:10px;height:10px;}
.add-act-row{display:flex;gap:.5rem;align-items:center;margin-top:.5rem;}
.add-act-inp{flex:1;background:hsla(220,15%,92%,.6);border:1px solid var(--border);border-radius:6px;padding:.3rem .6rem;font-size:.75rem;color:var(--fg);outline:none;}
.add-act-inp:focus{border-color:var(--primary);}
.add-act-inp::placeholder{color:hsla(220,10%,45%,.5);}

/* ── Track list (right col) ───────────────────────────────────────────── */
.track-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.track-title{display:flex;align-items:center;gap:.375rem;}
.track-emoji{font-size:.875rem;}
.cfg-btn{background:none;border:none;padding:2px;color:hsla(220,10%,45%,.4);display:flex;align-items:center;transition:all .15s;}
.cfg-btn:hover{color:var(--muted-fg);}
.cfg-btn svg{width:14px;height:14px;}

.cfg-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;box-shadow:var(--shadow);margin-bottom:.75rem;}
.cfg-panel-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.cfg-panel-title{font-size:.75rem;font-weight:600;}
.close-btn{background:none;border:none;color:hsla(220,10%,45%,.4);display:flex;align-items:center;transition:color .15s;}
.close-btn:hover{color:var(--muted-fg);}
.close-btn svg{width:14px;height:14px;}
.preset-chips{display:flex;flex-wrap:wrap;gap:.375rem;margin-bottom:.75rem;}
.preset-chip{font-size:10px;font-weight:500;padding:.25rem .625rem;border-radius:.5rem;background:hsla(220,15%,92%,.5);color:var(--muted-fg);border:none;transition:all .13s;}
.preset-chip:hover{background:var(--muted);}
.preset-chip.active{background:var(--primary);color:#fff;}
.custom-sep{border-top:1px solid var(--border);padding-top:.625rem;}
.custom-label{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:hsla(220,10%,45%,.6);margin-bottom:.5rem;}
.custom-row{display:flex;gap:.5rem;margin-bottom:.5rem;}
.emoji-inp{width:38px;text-align:center;background:hsla(220,15%,92%,.4);border:1px solid var(--border);border-radius:6px;padding:.3rem;font-size:.875rem;outline:none;}
.lbl-inp{flex:1;background:hsla(220,15%,92%,.4);border:1px solid var(--border);border-radius:6px;padding:.3rem .6rem;font-size:.75rem;color:var(--fg);outline:none;}
.lbl-inp:focus,.emoji-inp:focus{border-color:var(--primary);}
.lbl-inp::placeholder{color:hsla(220,10%,45%,.5);}
.labels-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.375rem;margin-bottom:.5rem;}

.month-nav{display:flex;align-items:center;justify-content:center;gap:.75rem;margin-bottom:.75rem;}
.month-nav-btn{background:none;border:none;padding:4px;border-radius:6px;display:flex;align-items:center;color:var(--muted-fg);transition:background .13s;}
.month-nav-btn:hover{background:hsla(220,15%,92%,.5);}
.month-nav-btn svg{width:14px;height:14px;}
.month-label{font-size:.875rem;font-weight:600;letter-spacing:-.01em;}

.track-item{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:.75rem;display:flex;align-items:center;gap:.75rem;
  box-shadow:var(--shadow);transition:border-color .13s;
}
.track-item+.track-item{margin-top:.375rem;}
.track-item:hover{border-color:hsla(220,15%,88%,.8);}
.track-item:hover .t-del{opacity:1;}
.t-icon{flex-shrink:0;display:flex;align-items:center;}
.t-icon svg{width:16px;height:16px;}
.t-icon.active svg{color:var(--primary);}
.t-icon.completed svg{color:var(--accent);}
.t-icon.upcoming svg{color:var(--streak);}
.t-info{flex:1;min-width:0;}
.t-title{font-size:.8125rem;font-weight:600;color:hsla(220,20%,10%,.9);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.t-sub{font-size:.6875rem;color:hsla(220,10%,45%,.6);}
.t-select{font-size:10px;font-weight:500;background:var(--muted);border:1px solid var(--border);border-radius:.5rem;padding:.2rem .5rem;color:var(--muted-fg);outline:none;cursor:pointer;flex-shrink:0;}
.t-del{background:none;border:none;color:hsla(220,10%,45%,.3);opacity:0;display:flex;align-items:center;transition:all .15s;flex-shrink:0;}
.t-del:hover{color:var(--destructive);}
.t-del svg{width:14px;height:14px;}
.track-empty{font-size:.75rem;color:hsla(220,10%,45%,.6);text-align:center;padding:1.5rem 0;}

.add-form{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:.75rem;box-shadow:var(--shadow);margin-top:.5rem;}
.form-inp{
  width:100%;background:hsla(220,15%,92%,.4);border:1px solid var(--border);
  border-radius:.5rem;padding:.4375rem .75rem;font-size:.875rem;color:var(--fg);outline:none;
}
.form-inp+.form-inp{margin-top:.5rem;}
.form-inp:focus{box-shadow:0 0 0 2px hsla(230,65%,55%,.3);border-color:var(--primary);}
.form-inp::placeholder{color:hsla(220,10%,45%,.5);}
.form-btns{display:flex;gap:.75rem;margin-top:.5rem;}

/* ── Kanban ───────────────────────────────────────────────────────────── */
.kanban-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.reset-btn{
  display:flex;align-items:center;gap:.375rem;font-size:11px;font-weight:500;
  padding:.3rem .625rem;border-radius:.5rem;border:1px solid var(--border);
  background:hsla(220,15%,92%,.5);color:var(--muted-fg);transition:all .15s;
}
.reset-btn:hover{background:hsla(0,70%,55%,.1);color:var(--destructive);border-color:hsla(0,70%,55%,.3);}
.reset-btn svg{width:14px;height:14px;}
.kanban-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;}
@media(max-width:600px){.kanban-grid{grid-template-columns:1fr;}}
.k-col{
  background:var(--card);border:1px solid var(--border);border-top-width:2px;
  border-radius:var(--radius);padding:.75rem;min-height:200px;box-shadow:var(--shadow);
}
.k-col.todo{border-top-color:var(--streak);}
.k-col.inprog{border-top-color:var(--primary);}
.k-col.done{border-top-color:var(--accent);}
.k-col-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.75rem;}
.k-col-title{display:flex;align-items:center;gap:.5rem;}
.k-col-name{font-size:.75rem;font-weight:600;}
.k-col-count{font-size:10px;background:hsla(220,15%,92%,.6);color:var(--muted-fg);border-radius:999px;padding:1px 6px;font-weight:500;}
.k-add-btn{background:none;border:none;color:hsla(220,10%,45%,.4);display:flex;align-items:center;transition:all .15s;}
.k-add-btn:hover{color:var(--primary);}
.k-add-btn svg{width:14px;height:14px;}
.k-task{
  background:var(--bg);border:1px solid var(--border);border-radius:.5rem;
  padding:.625rem .75rem;display:flex;align-items:flex-start;gap:.5rem;
  cursor:grab;transition:all .15s;margin-bottom:.375rem;
}
.k-task:hover{border-color:hsla(230,65%,55%,.3);}
.k-task.dragging{opacity:.4;}
.k-task:hover .k-del{opacity:.3;}
.k-grip{color:hsla(220,10%,45%,.3);flex-shrink:0;margin-top:2px;display:flex;align-items:center;}
.k-grip svg{width:12px;height:12px;}
.k-text{font-size:.75rem;color:hsla(220,20%,10%,.9);flex:1;line-height:1.625;}
.k-text.done-txt{text-decoration:line-through;color:hsla(220,10%,45%,.6);}
.k-del{background:none;border:none;color:hsla(220,10%,45%,.2);opacity:0;display:flex;align-items:center;transition:all .15s;flex-shrink:0;}
.k-del:hover{color:var(--destructive);opacity:1 !important;}
.k-del svg{width:12px;height:12px;}
.k-add-form{margin-top:.375rem;}
.k-inp{
  width:100%;background:hsla(220,15%,92%,.4);border:1px solid var(--border);
  border-radius:.5rem;padding:.375rem .625rem;font-size:.75rem;color:var(--fg);outline:none;
}
.k-inp:focus{box-shadow:0 0 0 2px hsla(230,65%,55%,.3);border-color:var(--primary);}
.k-inp::placeholder{color:hsla(220,10%,45%,.5);}
.k-form-btns{display:flex;gap:.5rem;margin-top:.375rem;}

/* ── History ──────────────────────────────────────────────────────────── */
.hist-toggle{
  display:flex;align-items:center;gap:.5rem;
  font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted-fg);background:none;border:none;margin:0 auto;
  transition:color .15s;
}
.hist-toggle:hover{color:var(--fg);}
.hist-toggle svg{width:14px;height:14px;}
.hist-month{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;margin-top:.5rem;}
.hist-month-btn{width:100%;display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;background:none;border:none;transition:background .13s;}
.hist-month-btn:hover{background:hsla(220,15%,92%,.3);}
.hist-month-name{font-size:.875rem;font-weight:600;letter-spacing:-.01em;}
.hist-month-meta{display:flex;align-items:center;gap:.75rem;}
.hist-stat{font-size:10px;color:hsla(220,10%,45%,.6);}
.hist-month-btn svg{width:14px;height:14px;color:var(--muted-fg);}
.hist-body{padding:.25rem 1rem 1rem;}
.hist-col-label{display:flex;align-items:center;gap:.375rem;margin-bottom:.25rem;margin-top:.75rem;}
.hist-col-label svg{width:12px;height:12px;}
.hist-col-name{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:hsla(220,10%,45%,.6);}
.hist-col-count{font-size:9px;color:hsla(220,10%,45%,.4);}
.hist-task{font-size:.75rem;font-weight:500;padding-left:1rem;margin-bottom:2px;}
.hist-task.done-txt{text-decoration:line-through;color:hsla(220,10%,45%,.5);}
.hist-no-data{font-size:.75rem;color:hsla(220,10%,45%,.6);text-align:center;padding:1rem 0;}

/* Year heatmap */
.yr-review{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem;box-shadow:var(--shadow);}
.yr-cat+.yr-cat{margin-top:1.5rem;}
.yr-cat-hdr{display:flex;align-items:center;gap:.5rem;margin-bottom:.5rem;}
.yr-cat-name{font-size:.875rem;font-weight:700;color:var(--primary);}
.yr-stats{display:flex;align-items:center;gap:1rem;font-size:.75rem;color:var(--muted-fg);margin-bottom:.5rem;}
